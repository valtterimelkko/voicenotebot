services:
  redis:
    image: redis:7-alpine
    container_name: voicenotebot-redis
    # Port not exposed externally - only internal communication
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    container_name: voicenotebot-webhook
    ports:
      - "127.0.0.1:9999:8000"  # 🔒 LOCALHOST ONLY - prevents scanner noise
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/asr}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - default
      - whisper_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Add log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/asr}
      - WHISPER_CONCURRENCY=1  # 🔧 Limit to 1 concurrent Whisper job per worker
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    restart: always
    networks:
      - default
      - whisper_network
    # Add log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    driver: bridge
  whisper_network:
    external: true
    name: n8n-docker-caddy_default

volumes:
  redis_data:
    driver: local
