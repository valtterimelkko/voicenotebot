services:
  redis:
    image: redis:7-alpine
    container_name: voicenotebot-redis
    # Port not exposed externally - only internal communication
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    container_name: voicenotebot-webhook
    ports:
      - "9999:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - whisper_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8000}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    restart: unless-stopped
    networks:
      - default
      - whisper_network

networks:
  default:
    driver: bridge
  whisper_network:
    external: true
    name: n8n-docker-caddy_default

volumes:
  redis_data:
    driver: local
